events { worker_connections 1024; }

http {
    include       mime.types;
    default_type  application/octet-stream;

    # Aggressive caching for offline standalone usage
    proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=eduos_cache:50m max_size=2g inactive=7d use_temp_path=off;

    server {
        listen 80;
        server_name localhost;

        # 1. Main Next.js Standalone App
        location / {
            proxy_pass http://localhost:3000; # Point to the standalone node process
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-EduOS "true";
            proxy_cache_bypass $http_upgrade;
            
            # Caching for stability
            proxy_cache eduos_cache;
            proxy_cache_valid 200 7d;
            proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        }

        # 2. Supabase Caching (for offline syllabus/notes)
        location /supabase/ {
            proxy_cache eduos_cache;
            proxy_cache_valid 200 24h;
            proxy_cache_use_stale error timeout http_500 http_502 http_503 http_504;
            proxy_pass https://your-project-id.supabase.co/;
            proxy_set_header Host your-project-id.supabase.co;
        }

        # Security: Block common escape attempts
        location ~ /\.(?!well-known) {
            deny all;
        }
    }
}
