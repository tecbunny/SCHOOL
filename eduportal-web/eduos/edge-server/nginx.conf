events { worker_connections 1024; }

http {
    proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=eduportal_cache:10m max_size=1g inactive=60m use_temp_path=off;

    server {
        listen 80;
        server_name localhost;

        location / {
            proxy_cache eduportal_cache;
            proxy_cache_valid 200 302 60m;
            proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
            
            # Point to your production Vercel URL
            proxy_pass https://eduportal-shubhams-projects.vercel.app;
            proxy_set_header Host eduportal-shubhams-projects.vercel.app;
            proxy_set_header X-EduOS "true";
            proxy_ssl_server_name on;
        }

        # Cache Supabase responses for 1 minute to reduce API calls
        location /supabase/ {
            proxy_cache eduportal_cache;
            proxy_cache_valid 200 1m;
            proxy_set_header X-EduOS "true";
            proxy_pass https://your-project-id.supabase.co/;
        }
    }
}
